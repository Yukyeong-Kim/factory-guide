<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PO창고 길안내</title>

<style>
body {margin:0;font-family:sans-serif;text-align:center;background:#f5f5f5;}
.header {background:linear-gradient(to right,#c2185b,#00acc1);color:white;padding:10px;}
.map-box {position:relative;max-width:600px;margin:auto;}
.map-box img {width:100%;display:block;}

.truck {
    position:absolute;
    font-size:9px;
    transform:translate(-50%,-50%);
    animation:blink 1s infinite;
}

@keyframes blink {
    0%{opacity:1;}
    50%{opacity:0.2;}
    100%{opacity:1;}
}

button {
    margin:10px;
    padding:10px;
    background:#1976d2;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="header">🚚 PO창고 길안내</div>
<button onclick="restartGPS()">📡 위치 재조정</button>

<div class="map-box" id="map">
    <!-- ✅ 이미지 정상 -->
    <img src="factory_map.png">
    <div id="truck" class="truck">🚚</div>
</div>

<script>
const map = document.getElementById("map");
const truck = document.getElementById("truck");

let watchId = null;

/* ✅ ✅ ✅ 당신 전체 좌표 그대로 사용 */
const route = [
{lat:36.992555555555555, lon:126.36955555555555},
{lat:36.9927503, lon:126.3700025},
{lat:36.993106, lon:126.3729744},
{lat:36.9935087, lon:126.3744174},
{lat:36.9945, lon:126.37458},
{lat:36.9955987, lon:126.3782476},
{lat:36.9967777, lon:126.3799166},
{lat:36.9984444, lon:126.3791388},
{lat:36.9988462, lon:126.3822422},
{lat:37.0000833, lon:126.3839166}
];

/* ✅ 전체 범위 기준 (핵심🔥) */
const lats = route.map(p=>p.lat);
const lons = route.map(p=>p.lon);

const minLat = Math.min(...lats);
const maxLat = Math.max(...lats);
const minLon = Math.min(...lons);
const maxLon = Math.max(...lons);

/* ✅ GPS → 화면 좌표 */
function convertToScreen(lat, lon){

    const w = map.clientWidth;
    const h = map.clientHeight;

    const x = (lon - minLon) / (maxLon - minLon);
    const y = (lat - minLat) / (maxLat - minLat);

    return {
        x: x * w,
        y: (1 - y) * h
    };
}

/* ✅ ✅ ✅ 선 snap */
function snapToRoute(lat, lon){

    let best = null;
    let minDist = Infinity;

    for(let i=0;i<route.length-1;i++){

        const A = route[i];
        const B = route[i+1];

        const dx = B.lon - A.lon;
        const dy = B.lat - A.lat;

        const t = ((lon-A.lon)*dx + (lat-A.lat)*dy)/(dx*dx+dy*dy);
        const clamped = Math.max(0, Math.min(1,t));

        const projLon = A.lon + clamped*dx;
        const projLat = A.lat + clamped*dy;

        const dist = Math.hypot(lat-projLat, lon-projLon);

        if(dist < minDist){
            minDist = dist;
            best = {lat:projLat, lon:projLon};
        }
    }

    return convertToScreen(best.lat, best.lon);
}

/* ✅ 이동 */
function moveTruck(pos){
    truck.style.left = pos.x + "px";
    truck.style.top = pos.y + "px";
}

/* ✅ GPS */
function startGPS(){

    watchId = navigator.geolocation.watchPosition(
        (pos)=>{
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            const p = snapToRoute(lat, lon);
            moveTruck(p);
        },
        ()=>{},
        {enableHighAccuracy:true}
    );
}

/* ✅ 재시작 */
function restartGPS(){
    if(watchId) navigator.geolocation.clearWatch(watchId);
    startGPS();
}

/* ✅ 시작 */
document.body.addEventListener("click", ()=>{
    if(!watchId){
        startGPS();
    }
});
</script>

</body>
</html>
