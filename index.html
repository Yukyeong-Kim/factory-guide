<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PO창고 길안내</title>

<style>
body {margin:0;text-align:center;background:#f5f5f5;}
.map-box {position:relative;max-width:600px;margin:auto;}
.map-box img {width:100%;display:block;}
.truck {
    position:absolute;
    font-size:10px;
    transform:translate(-50%,-50%);
    animation:blink 1s infinite;
}
@keyframes blink {
    0%{opacity:1;}
    50%{opacity:0.2;}
    100%{opacity:1;}
}
button {margin:10px;padding:10px;}
</style>
</head>

<body>

<button onclick="restartGPS()">📡 위치 재조정</button>

<div class="map-box" id="map">
    <img src="factory_map.png" id="mapImg">
    <div id="truck" class="truck">🚚</div>
</div>

<script>
const map = document.getElementById("map");
const img = document.getElementById("mapImg");
const truck = document.getElementById("truck");

let watchId;

/* ✅ ✅ ✅ 3개 기준점 (반드시 정확히 입력!!) */

/* ✅ 1️⃣ 서문 */
const p1 = {
    lat:36.9925555555,
    lon:126.3695555555,
    x:0.05,   // 👉 이미지에서 위치 직접 맞춰야 함
    y:0.96
};

/* ✅ 2️⃣ 방재실 */
const p2 = {
    lat:36.9945,
    lon:126.37458,
    x:0.38,
    y:0.70
};

/* ✅ 3️⃣ PO창고 */
const p3 = {
    lat:37.00008,
    lon:126.38391,
    x:0.85,
    y:0.10
};

/* ✅ GPS → 화면 좌표 */
function gpsToScreen(lat, lon){

    const w = map.clientWidth;
    const h = map.clientHeight;

    const det = (p2.lon - p1.lon)*(p3.lat - p1.lat) - (p3.lon - p1.lon)*(p2.lat - p1.lat);

    const a = ((lon - p1.lon)*(p3.lat - p1.lat) - (p3.lon - p1.lon)*(lat - p1.lat)) / det;
    const b = ((p2.lon - p1.lon)*(lat - p1.lat) - (lon - p1.lon)*(p2.lat - p1.lat)) / det;

    const c = 1 - a - b;

    const xRatio = a*p2.x + b*p3.x + c*p1.x;
    const yRatio = a*p2.y + b*p3.y + c*p1.y;

    return {
        x: xRatio * w,
        y: yRatio * h
    };
}

/* ✅ 선 snap (그대로 유지) */
function snapToRoute(lat, lon){

    let best = null;
    let minDist = Infinity;

    for(let i=0;i<route.length-1;i++){

        const A = route[i];
        const B = route[i+1];

        const dx = B.lon - A.lon;
        const dy = B.lat - A.lat;

        const t = ((lon-A.lon)*dx + (lat-A.lat)*dy)/(dx*dx+dy*dy);
        const clamped = Math.max(0, Math.min(1,t));

        const projLon = A.lon + clamped*dx;
        const projLat = A.lat + clamped*dy;

        const dist = Math.hypot(lat-projLat, lon-projLon);

        if(dist < minDist){
            minDist = dist;
            best = {lat:projLat, lon:projLon};
        }
    }

    return gpsToScreen(best.lat, best.lon);
}

/* ✅ 이동 */
function moveTruck(pos){
    truck.style.left = pos.x + "px";
    truck.style.top = pos.y + "px";
}

/* ✅ GPS */
function startGPS(){
    watchId = navigator.geolocation.watchPosition(
        (pos)=>{
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            const p = snapToRoute(lat, lon);
            moveTruck(p);
        },
        ()=>{},
        {enableHighAccuracy:true}
    );
}

function restartGPS(){
    if(watchId) navigator.geolocation.clearWatch(watchId);
    startGPS();
}

document.body.addEventListener("click", ()=>{
    if(!watchId) startGPS();
});
</script>

</body>
</html>
