<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PO창고 길안내</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    text-align:center;
    background:#f5f5f5;
}

.header {
    background: linear-gradient(to right,#c2185b,#00acc1);
    color:white;
    padding:10px;
    font-weight:bold;
}

.map-box {
    position: relative;
    max-width: 600px;
    margin:auto;
}

.map-box img {
    width:100%;
    display:block;
}

/* 트럭 */
.truck {
    position:absolute;
    font-size:9px;
    transform: translate(-50%,-50%);
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity:1;}
    50% {opacity:0.2;}
    100% {opacity:1;}
}

.status {
    margin:10px;
    font-size:18px;
    font-weight:bold;
}

button {
    padding:10px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#1976d2;
    color:white;
}
</style>
</head>

<body>

<div class="header">🚚 PO창고 길안내</div>

<div id="statusBox" class="status">
화면 터치 후 시작
</div>

<button onclick="restartGPS()">📡 위치 재조정</button>

<div class="map-box" id="map">
    <!-- ✅ ✅ ✅ 핵심 -->
    <img src="factory_map.png" alt="지도">

    <div id="truck" class="truck">🚚</div>
</div>

<script>
const map = document.getElementById("map");
const truck = document.getElementById("truck");
const statusBox = document.getElementById("statusBox");

let watchId = null;

/* ✅ 경로 (일부만 표시 / 나머지는 그대로 붙이면 됨) */
const route = [
    {lat:36.9925555555, lon:126.3695555555},
    {lat:36.9926475, lon:126.3697772},
    {lat:36.9927503, lon:126.3700025},
    {lat:36.9928146, lon:126.37026},
    {lat:36.9928489, lon:126.3705014},
    {lat:36.992866, lon:126.3707964},
    {lat:36.9933759, lon:126.3739614},
    {lat:36.9945, lon:126.37458},
    {lat:36.9947986, lon:126.3749994},
    {lat:36.9955987, lon:126.3782476},
    {lat:36.9967777, lon:126.3799166},
    {lat:36.9969568, lon:126.3798336},
    {lat:36.9984444, lon:126.3791388},
    {lat:36.9988462, lon:126.3822422},
    {lat:36.9989444, lon:126.3841666},
    {lat:37.0000833, lon:126.3839166}
];

/* 기준점 */
const ref1 = route[0];
const ref2 = route[route.length-1];

/* GPS → 비율 */
function gpsToRatio(lat, lon){
    const rx = (lon - ref1.lon) / (ref2.lon - ref1.lon);
    const ry = (lat - ref1.lat) / (ref2.lat - ref1.lat);
    return {x: rx, y: 1-ry};
}

/* ✅ ✅ ✅ 선 snap */
function snapToRoute(lat, lon){

    let best = null;
    let minDist = Infinity;

    for(let i=0;i<route.length-1;i++){

        const A = route[i];
        const B = route[i+1];

        const dx = B.lon - A.lon;
        const dy = B.lat - A.lat;

        const t = ((lon-A.lon)*dx + (lat-A.lat)*dy)/(dx*dx+dy*dy);
        const t2 = Math.max(0, Math.min(1,t));

        const projLon = A.lon + t2*dx;
        const projLat = A.lat + t2*dy;

        const dist = Math.hypot(lat-projLat, lon-projLon);

        if(dist < minDist){
            minDist = dist;
            best = {lat:projLat, lon:projLon};
        }
    }

    return gpsToRatio(best.lat, best.lon);
}

/* 이동 */
function moveTruck(rx, ry){
    const w = map.clientWidth;
    const h = map.clientHeight;

    truck.style.left = (rx*w)+"px";
    truck.style.top = (ry*h)+"px";
}

/* GPS 시작 */
function startGPS(){
    watchId = navigator.geolocation.watchPosition(
        (pos)=>{
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            const p = snapToRoute(lat, lon);
            moveTruck(p.x, p.y);

            statusBox.innerText = "🟢 경로 위 위치";
        },
        ()=>{
            statusBox.innerText = "📡 GPS 신호 약함";
        },
        {enableHighAccuracy:true}
    );
}

/* 재조정 */
function restartGPS(){
    if(watchId) navigator.geolocation.clearWatch(watchId);
    statusBox.innerText = "📡 재조정 중...";
    startGPS();
}

/* 시작 */
document.body.addEventListener("click", ()=>{
    if(!watchId){
        startGPS();
    }
});
</script>

</body>
</html>
