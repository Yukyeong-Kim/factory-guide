<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PO창고 길안내</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    text-align:center;
    background:#f5f5f5;
}

.header {
    background: linear-gradient(to right,#c2185b,#00acc1);
    color:white;
    padding:10px;
    font-weight:bold;
}

.map-box {
    position: relative;
    max-width: 600px;
    margin:auto;
}

.map-box img {
    width:100%;
}

/* ✅ ✅ ✅ 트럭 절반 크기 */
.truck {
    position:absolute;
    font-size:9px;  /* ⭐ 핵심 변경 */
    transform: translate(-50%, -50%);
    transition: all 0.3s ease;
}

.pin {
    position:absolute;
    font-size:25px;
    transform: translate(-50%,-50%);
}

.status {
    margin:10px;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>

<body>

<div class="header">🚚 PO창고 길안내</div>

<div class="status" id="statusBox">
GPS 확인 중...
</div>

<div class="map-box">
    factory_map.png

    <div id="truck" class="truck">🚚</div>
    <div id="pin" class="pin">📍</div>
</div>

<script>
const truck = document.getElementById("truck");
const pin = document.getElementById("pin");
const statusBox = document.getElementById("statusBox");

/* ✅ 경로 */
const route = [
    {lat:36.9925492, lon:126.3695483, x:90, y:350, msg:"직진하세요"},
    {lat:36.9944902, lon:126.3745901, x:150, y:260, msg:"직진하세요"},
    {lat:36.9967810, lon:126.3799103, x:270, y:210, msg:"우회전하세요"},
    {lat:36.9984565, lon:126.3791392, x:310, y:160, msg:"직진하세요"},
    {lat:36.9989486, lon:126.3841774, x:430, y:135, msg:"좌회전하세요"},
    {lat:37.0000714, lon:126.3839266, x:470, y:80, msg:"도착입니다"}
];

/* ✅ 목적지 */
const dest = route[route.length-1];
pin.style.left = dest.x+"px";
pin.style.top = dest.y+"px";

/* ✅ GPS → 지도 변환 */
const ref1 = route[0];
const ref2 = route[route.length-1];

function gpsToMap(lat, lon){
    const rx = (lon - ref1.lon) / (ref2.lon - ref1.lon);
    const ry = (lat - ref1.lat) / (ref2.lat - ref1.lat);
    return {
        x: ref1.x + rx*(ref2.x-ref1.x),
        y: ref1.y - ry*(ref1.y-ref2.y)
    };
}

/* ✅ snap */
function snapToRoute(p){

    let closest = null;
    let minDist = Infinity;

    for(let i=0; i<route.length-1; i++){

        const a = route[i];
        const b = route[i+1];

        const dx = b.x - a.x;
        const dy = b.y - a.y;

        const t = ((p.x-a.x)*dx + (p.y-a.y)*dy) / (dx*dx + dy*dy);
        const t2 = Math.max(0, Math.min(1, t));

        const x = a.x + dx*t2;
        const y = a.y + dy*t2;

        const dist = Math.hypot(p.x-x, p.y-y);

        if(dist < minDist){
            minDist = dist;
            closest = {x,y,index:i};
        }
    }

    return closest;
}

/* ✅ 이동 */
function moveTruck(x,y){
    truck.style.left = x+"px";
    truck.style.top = y+"px";
}

/* ✅ 음성 안내 */
function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "ko-KR";
    speechSynthesis.speak(msg);
}

let lastMsg = "";

/* ✅ GPS */
navigator.geolocation.watchPosition(
    (pos)=>{
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        const raw = gpsToMap(lat, lon);
        const snapped = snapToRoute(raw);

        moveTruck(snapped.x, snapped.y);

        const step = route[snapped.index];
        statusBox.innerText = step.msg;

        if(step.msg !== lastMsg){
            speak(step.msg);
            lastMsg = step.msg;
        }
    },
    ()=>{
        statusBox.innerText = "📡 GPS 신호가 약합니다";
    },
    {
        enableHighAccuracy:true
    }
);
</script>

</body>
</html>
``
