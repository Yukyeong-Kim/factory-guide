<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PO창고 길안내</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    text-align:center;
    background:#f5f5f5;
}

.header {
    background: linear-gradient(to right,#c2185b,#00acc1);
    color:white;
    padding:10px;
    font-weight:bold;
}

.map-box {
    position: relative;
    max-width: 600px;
    margin:auto;
}

.map-box img {
    width:100%;
    display:block;
}

/* ✅ 트럭 (깜빡임) */
.truck {
    position:absolute;
    font-size:9px;
    transform: translate(-50%,-50%);
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity:1;}
    50% {opacity:0.2;}
    100% {opacity:1;}
}

.status {
    margin:10px;
    font-size:18px;
    font-weight:bold;
}

button {
    padding:10px 15px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    background:#1976d2;
    color:white;
    font-size:14px;
}
</style>
</head>

<body>

<div class="header">🚚 PO창고 길안내</div>

<div id="statusBox" class="status">화면 터치 후 시작</div>

<button onclick="restartGPS()">📡 위치 재조정</button>

<div class="map-box" id="map">
    <img src="factory_map.png">
    <div id="truck" class="truck">🚚</div>
</div>

<script>
const map = document.getElementById("map");
const truck = document.getElementById("truck");
const statusBox = document.getElementById("statusBox");

let watchId = null;

/* ✅ ✅ ✅ 경로 (추가 GPS 포함) */
const route = [
    {lat:36.9925492, lon:126.3695483},

    {lat:36.9928869, lon:126.3713125},
    {lat:36.9932715, lon:126.3738522},
    {lat:36.9935942, lon:126.3747165},

    {lat:36.9944902, lon:126.3745901},

    {lat:36.9947504, lon:126.3745020},
    {lat:36.9951109, lon:126.3768670},
    {lat:36.9955934, lon:126.3784036},
    {lat:36.9962337, lon:126.3793340},

    {lat:36.9967810, lon:126.3799103},

    {lat:36.9972764, lon:126.3796994},
    {lat:36.9977763, lon:126.3794560},
    {lat:36.9981764, lon:126.3792582},

    {lat:36.9984565, lon:126.3791392},

    {lat:36.9986554, lon:126.3801993},
    {lat:36.9986292, lon:126.3814620},
    {lat:36.9989189, lon:126.3827035},
    {lat:36.9987403, lon:126.3836305},

    {lat:36.9989486, lon:126.3841774},

    {lat:36.9994892, lon:126.3840228},

    {lat:37.0000714, lon:126.3839266}
];

/* ✅ 기준점 2개 */
const ref1 = route[0];
const ref2 = route[route.length-1];

/* ✅ GPS → 비율 좌표 */
function gpsToRatio(lat, lon){

    const rx = (lon - ref1.lon) / (ref2.lon - ref1.lon);
    const ry = (lat - ref1.lat) / (ref2.lat - ref1.lat);

    return {
        x: ref1.x ? ref1.x : 0.15 + rx * (0.78-0.15),
        y: ref1.y ? ref1.y : 0.85 - ry * (0.85-0.20)
    };
}

/* ✅ snap */
function snapToRoute(lat, lon){

    let closest = route[0];
    let min = Infinity;

    route.forEach(p=>{
        const d = Math.hypot(lat - p.lat, lon - p.lon);
        if(d < min){
            min = d;
            closest = p;
        }
    });

    return gpsToRatio(closest.lat, closest.lon);
}

/* ✅ 이동 */
function moveTruck(rx, ry){

    const w = map.clientWidth;
    const h = map.clientHeight;

    truck.style.left = (rx * w) + "px";
    truck.style.top = (ry * h) + "px";
}

/* ✅ GPS 시작 */
function startGPS(){

    watchId = navigator.geolocation.watchPosition(
        (pos)=>{

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            const snap = snapToRoute(lat, lon);
            moveTruck(snap.x, snap.y);

            statusBox.innerText = "🟢 위치 확인됨";
        },
        ()=>{
            statusBox.innerText = "📡 GPS 신호 약함";
        },
        {
            enableHighAccuracy:true
        }
    );
}

/* ✅ 재조정 */
function restartGPS(){

    if(watchId !== null){
        navigator.geolocation.clearWatch(watchId);
    }

    statusBox.innerText = "📡 GPS 재조정 중...";
    startGPS();
}

/* ✅ 시작 터치 */
document.body.addEventListener("click", ()=>{
    if(!watchId){
        startGPS();
    }
});
</script>

</body>
</html>
``
